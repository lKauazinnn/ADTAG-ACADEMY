<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" width="96" height="96">
  <defs>
    <!-- Badge background: dark -->
    <radialGradient id="bg" cx="35%" cy="28%" r="80%">
      <stop offset="0%" stop-color="#2a0a1f"/>
      <stop offset="50%" stop-color="#1a0530"/>
      <stop offset="100%" stop-color="#050509"/>
    </radialGradient>

    <!-- Brand gradient: pink → purple -->
    <linearGradient id="brandGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E1306C"/>
      <stop offset="100%" stop-color="#9333ea"/>
    </linearGradient>

    <!-- L stroke gradient -->
    <linearGradient id="lGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f9a8d4"/>
    </linearGradient>

    <!-- Ring border gradient -->
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E1306C" stop-opacity="0.85"/>
      <stop offset="50%" stop-color="#9333ea" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#E1306C" stop-opacity="0.35"/>
    </linearGradient>

    <!-- Sparkle gradient -->
    <linearGradient id="sparkGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#fca5a5"/>
    </linearGradient>

    <!-- Shadow -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#E1306C" flood-opacity="0.3"/>
    </filter>

    <!-- L glow -->
    <filter id="lGlow" x="-30%" y="-25%" width="160%" height="150%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Sparkle glow -->
    <filter id="sparkGlow" x="-120%" y="-120%" width="340%" height="340%">
      <feGaussianBlur stdDeviation="3.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Clip -->
    <clipPath id="clip">
      <rect x="3" y="3" width="90" height="90" rx="22"/>
    </clipPath>
  </defs>

  <!-- Badge -->
  <rect x="3" y="3" width="90" height="90" rx="22" fill="url(#bg)" filter="url(#shadow)"/>

  <!-- Top glass sheen -->
  <rect x="3" y="3" width="90" height="48" rx="22" fill="white" opacity="0.05" clip-path="url(#clip)"/>

  <!-- Brand accent at bottom -->
  <rect x="3" y="80" width="90" height="13" rx="0" fill="url(#brandGrad)" opacity="0.15" clip-path="url(#clip)"/>

  <!-- Ring -->
  <rect x="3" y="3" width="90" height="90" rx="22" fill="none" stroke="url(#ringGrad)" stroke-width="1.5"/>

  <!-- Letter "L" -->
  <path d="M30,17 L30,67 L64,67"
        stroke="url(#lGrad)"
        stroke-width="11"
        stroke-linecap="round"
        stroke-linejoin="round"
        fill="none"
        filter="url(#lGlow)"/>

  <!-- 4-Pointed Star at top of L -->
  <path d="M30,17 L32.6,24.5 L30,32 L27.4,24.5 Z" fill="url(#sparkGrad)" filter="url(#sparkGlow)"/>
  <path d="M22.5,24.5 L30,21.8 L37.5,24.5 L30,27.2 Z" fill="url(#sparkGrad)" filter="url(#sparkGlow)"/>
  <circle cx="30" cy="24.5" r="3.2" fill="white" filter="url(#sparkGlow)"/>

  <!-- Small sparkle at foot of L -->
  <path d="M65,58 L66.5,62.5 L65,67 L63.5,62.5 Z" fill="white" opacity="0.5" filter="url(#sparkGlow)"/>
  <path d="M60.5,62.5 L65,61 L69.5,62.5 L65,64 Z" fill="white" opacity="0.5" filter="url(#sparkGlow)"/>

  <!-- Ambient dots -->
  <circle cx="71" cy="19" r="2" fill="#fca5a5" opacity="0.6"/>
  <circle cx="61" cy="27" r="1.2" fill="white" opacity="0.35"/>
</svg>
